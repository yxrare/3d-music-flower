<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>高密实体粉末花 - 隐秘数学律动版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010103; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .mono-label {
            font-family: "Courier New", Courier, monospace;
            letter-spacing: 4px;
            font-weight: 400;
            color: #b8b0d2;
            text-shadow: 0 0 18px rgba(184, 176, 210, 0.16);
        }
        #upload-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            border: 0;
            background: transparent;
            padding: 10px 0;
            cursor: pointer;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            font-size: 20px;
            line-height: 1;
        }
        #upload-btn:hover {
            color: #efeaff;
            text-shadow: 0 0 22px rgba(184, 176, 210, 0.36);
        }
        #presence {
            position: absolute;
            right: 30px;
            bottom: 30px;
            z-index: 10;
            text-align: right;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.75;
        }
        #presence-listeners {
            display: block;
            color: rgba(184, 176, 210, 0.72);
            letter-spacing: 2.5px;
            font-size: 12px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <button id="upload-btn" class="mono-label" title="Connect your player">Having a moment</button>
    <div id="presence" class="mono-label">
        <span id="presence-time"></span>
        <span id="presence-listeners"></span>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010103, 0.001);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 170); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 高遮罩粉尘贴图：中心厚、边缘碎，避免线框感和过度穿透。
        function createDenseDustTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 15);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.52, 'rgba(255,255,255,0.98)');
            gradient.addColorStop(0.78, 'rgba(255,255,255,0.72)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);

            ctx.globalCompositeOperation = 'destination-out';
            for (let i = 0; i < 34; i++) {
                const a = Math.random() * Math.PI * 2;
                const r = 8 + Math.random() * 8;
                const s = 0.8 + Math.random() * 1.8;
                ctx.globalAlpha = 0.18 + Math.random() * 0.28;
                ctx.beginPath();
                ctx.arc(16 + Math.cos(a) * r, 16 + Math.sin(a) * r, s, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            return texture;
        }

        // --- 46万高密实体粉尘粒子海 ---
        const particleCount = 460000; 
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const finalPositions = new Float32Array(particleCount * 3);
        const budPositions = new Float32Array(particleCount * 3);
        const bloomCenters = new Float32Array(particleCount * 3);
        const bloomExpansionWeights = new Float32Array(particleCount);
        const revealThresholds = new Float32Array(particleCount);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount); 

        // 调整极端比例：96% 用于构筑实体花卉植物，仅留 4% 作为隐秘变幻的暗物质
        const plantCount = Math.floor(particleCount * 0.96);
        const hiddenCount = particleCount - plantCount;
        const hiddenBasePositions = new Float32Array(hiddenCount * 3);
        const hiddenDustOffsets = new Float32Array(hiddenCount * 3);
        const hiddenPhases = new Float32Array(hiddenCount);
        const hiddenRadii = new Float32Array(hiddenCount);

        // 参考图：冰白花瓣、蓝色脉络、金黄花芯、深绿枝叶。
        const cPetalIce = new THREE.Color('#e7f3ff');
        const cPetalWhite = new THREE.Color('#fbfdff');
        const cPetalBlue = new THREE.Color('#74a7e5');
        const cPetalDeepBlue = new THREE.Color('#2f66bd');
        const cPistilYellow = new THREE.Color('#f2c21e'); 
        const cPistilAmber = new THREE.Color('#b98512');
        const cLeafGreen = new THREE.Color('#4b7f35'); 
        const cLeafDeep = new THREE.Color('#173924');
        const cStemGreen = new THREE.Color('#496f20'); 

        const flowerAnchorPoints = []; // 花冠坐标、颜色与粒径锚点，让变幻粒子彻底混入实体花粉。
        const bloomDefs = [
            { cx: -30, cy: 4, cz: 8, scale: 1.26, rot: -0.5, cup: 0.82, tilt: -0.16, reveal: 0.04 },
            { cx: 24, cy: 48, cz: -6, scale: 1.18, rot: 0.22, cup: 1.08, tilt: 0.08, reveal: 0.12 },
            { cx: -55, cy: 33, cz: -7, scale: 0.78, rot: -1.08, cup: 0.96, tilt: -0.08, reveal: 0.3 },
            { cx: 45, cy: 5, cz: 10, scale: 0.74, rot: 0.86, cup: 0.88, tilt: 0.1, reveal: 0.48 },
            { cx: -7, cy: 72, cz: 4, scale: 0.66, rot: -0.18, cup: 1.1, tilt: 0.03, reveal: 0.66 },
            { cx: 5, cy: -19, cz: -6, scale: 0.58, rot: 0.34, cup: 0.76, tilt: -0.12, reveal: 0.82 }
        ];
        const stemDefs = [
            { bx: -11, by: -78, bz: 0, tx: -30, ty: -3, tz: 8, curve: -8, radius: 3.1 },
            { bx: 11, by: -78, bz: -3, tx: 24, ty: 41, tz: -6, curve: 7, radius: 3.0 },
            { bx: 0, by: -76, bz: 5, tx: -4, ty: 7, tz: 0, curve: 2, radius: 2.2 },
            { bx: -5, by: -70, bz: 1, tx: -55, ty: 28, tz: -7, curve: -15, radius: 1.9 },
            { bx: 8, by: -72, bz: -4, tx: 45, ty: 0, tz: 10, curve: 11, radius: 1.8 },
            { bx: 3, by: -62, bz: 2, tx: -7, ty: 67, tz: 4, curve: -4, radius: 1.6 },
            { bx: -2, by: -67, bz: 0, tx: 5, ty: -25, tz: -6, curve: 5, radius: 1.5 }
        ];

        function mixPetalColor(depth, rim, veinStrength) {
            let base = cPetalWhite.clone().lerp(cPetalIce, 0.36 + depth * 0.24);
            base.lerp(cPetalBlue, depth * 0.22 + rim * 0.14);
            if (veinStrength > 0) base.lerp(cPetalDeepBlue, veinStrength);
            return base;
        }

        function flowerBudPoint(def) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            const rad = (3.5 + Math.random() * 8.5) * def.scale;
            const curl = Math.sin(phi) * rad;
            return {
                x: def.cx + Math.cos(theta) * curl * 0.72,
                y: def.cy - 8.5 * def.scale + Math.cos(phi) * rad * 0.86,
                z: def.cz + Math.sin(theta) * curl * 0.56
            };
        }

        function chooseBloomDef() {
            const r = Math.random();
            if (r < 0.3) return bloomDefs[0];
            if (r < 0.58) return bloomDefs[1];
            if (r < 0.72) return bloomDefs[2];
            if (r < 0.84) return bloomDefs[3];
            if (r < 0.93) return bloomDefs[4];
            return bloomDefs[5];
        }

        function enrichFlowerSample(sample, def, revealJitter = 0.04) {
            const bud = flowerBudPoint(def);
            sample.budX = bud.x;
            sample.budY = bud.y;
            sample.budZ = bud.z;
            sample.centerX = def.cx;
            sample.centerY = def.cy;
            sample.centerZ = def.cz;
            sample.expansion = 1;
            sample.reveal = Math.max(0, Math.min(0.94, def.reveal + (Math.random() - 0.5) * revealJitter));
            return sample;
        }

        function sampleBloom(def, forceVein = false) {
            const petals = 9;
            const petal = Math.floor(Math.random() * petals);
            const u = Math.pow(Math.random(), 0.64);
            const layer = Math.floor(Math.random() * 6);
            const veinBand = Math.random() < 0.42 ? 0 : (Math.random() > 0.5 ? 0.19 : -0.19);
            const rawV = forceVein
                ? veinBand + (Math.random() - 0.5) * 0.045
                : (Math.random() - 0.5) * (1.22 - u * 0.32);
            const v = rawV;
            const theta = def.rot + (petal / petals) * Math.PI * 2 + v * 0.32 + layer * 0.055;
            const rimWave = Math.sin(v * Math.PI * 7 + layer * 1.7) * Math.sin(u * Math.PI);
            const petalLift = Math.pow(u, 1.65) * (16 + layer * 2.2) * def.cup;
            const width = (16 + layer * 1.6) * def.scale * (1 - u * 0.12);
            const length = (24 + layer * 4.8) * def.scale;
            const thickness = (Math.random() - 0.5) * (3.8 + layer * 0.72) * def.scale;
            const ridge = rimWave * 1.65 + Math.sin(u * Math.PI * 10) * 0.7;

            const localX = (u * length + ridge) * Math.cos(theta) + v * width * Math.cos(theta + Math.PI / 2);
            const localZ = (u * length + ridge) * Math.sin(theta) + v * width * Math.sin(theta + Math.PI / 2);
            const localY = Math.sin(u * Math.PI) * (8 + layer * 1.6) * def.scale + petalLift + thickness * 0.34 + def.tilt * localX;
            const veinStrength = forceVein ? 0.5 + Math.random() * 0.25 : Math.max(0, 0.22 - Math.abs(v)) * 0.42;

            return enrichFlowerSample({
                x: def.cx + localX,
                y: def.cy + localY - u * 9.2 * def.scale,
                z: def.cz + localZ * 0.62 + thickness,
                color: mixPetalColor(u, Math.abs(v), veinStrength),
                size: forceVein ? Math.random() * 0.18 + 0.36 : Math.random() * 0.42 + 0.54
            }, def);
        }

        function samplePistil(def) {
            const theta = Math.random() * Math.PI * 2;
            const rad = Math.pow(Math.random(), 0.42) * 6.7 * def.scale;
            const height = Math.pow(Math.random(), 0.7) * 7.5 * def.scale;
            const lean = 1.6 + Math.random() * 2.2;
            return enrichFlowerSample({
                x: def.cx + Math.cos(theta) * (rad + lean * height / 7),
                y: def.cy + 2.5 * def.scale + height,
                z: def.cz + Math.sin(theta) * (rad * 0.72 + lean * height / 9),
                color: cPistilYellow.clone().lerp(cPistilAmber, Math.random() * 0.34),
                size: Math.random() * 0.36 + 0.56
            }, def, 0.02);
        }

        function sampleCalyx(def) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            const rad = (6.4 + Math.random() * 2.6) * def.scale;
            return enrichFlowerSample({
                x: def.cx + Math.sin(phi) * Math.cos(theta) * rad,
                y: def.cy - 7.8 * def.scale + Math.cos(phi) * rad * 0.72,
                z: def.cz + Math.sin(phi) * Math.sin(theta) * rad * 0.72,
                color: cLeafGreen.clone().lerp(cStemGreen, 0.32 + Math.random() * 0.24),
                size: Math.random() * 0.32 + 0.5
            }, def, 0.03);
        }

        function sampleStem(def) {
            const t = Math.random();
            const y = def.by + (def.ty - def.by) * t;
            const bend = Math.sin(t * Math.PI);
            const centerX = def.bx + (def.tx - def.bx) * t + def.curve * bend;
            const centerZ = def.bz + (def.tz - def.bz) * t - def.curve * 0.28 * bend;
            const thickness = def.radius * (1.12 - t * 0.34) * (0.72 + Math.random() * 0.34);
            const angle = Math.random() * Math.PI * 2;
            return {
                x: centerX + Math.cos(angle) * thickness,
                y,
                z: centerZ + Math.sin(angle) * thickness,
                color: cStemGreen.clone().lerp(cLeafGreen, 0.12 + Math.random() * 0.22),
                size: Math.random() * 0.34 + 0.44,
                budX: centerX + Math.cos(angle) * thickness,
                budY: y,
                budZ: centerZ + Math.sin(angle) * thickness,
                reveal: 0
            };
        }

        function sampleLeaf() {
            const side = Math.random() > 0.5 ? 1 : -1;
            const stem = stemDefs[Math.floor(Math.random() * stemDefs.length)];
            const t = 0.2 + Math.random() * 0.62;
            const u = Math.pow(Math.random(), 0.8);
            const v = (Math.random() - 0.5) * Math.sin(u * Math.PI) * 1.15;
            const baseX = stem.bx + (stem.tx - stem.bx) * t + stem.curve * Math.sin(t * Math.PI);
            const baseY = stem.by + (stem.ty - stem.by) * t;
            const baseZ = stem.bz + (stem.tz - stem.bz) * t;
            const leafAngle = side * (0.55 + Math.random() * 0.72);
            const x = baseX + Math.cos(leafAngle) * u * 34 + v * 10;
            const y = baseY + Math.sin(u * Math.PI) * 7 - u * 2;
            const z = baseZ + Math.sin(leafAngle) * u * 17 + v * 12;
            const reveal = 0.08 + Math.random() * 0.58;
            return {
                x,
                y,
                z,
                color: cLeafGreen.clone().lerp(cLeafDeep, Math.random() * 0.52),
                size: Math.random() * 0.28 + 0.36,
                budX: baseX + (Math.random() - 0.5) * 2,
                budY: baseY + (Math.random() - 0.5) * 2,
                budZ: baseZ + (Math.random() - 0.5) * 2,
                reveal
            };
        }

        for (let i = 0; i < particleCount; i++) {
            let sample;

            if (i < plantCount) {
                // 【96% 绝对主角：多花冠、高密、厚粉末植物实体】
                const r = Math.random();
                if (r < 0.58) {
                    const def = chooseBloomDef();
                    sample = sampleBloom(def, false);
	                    if (i % 9 === 0) flowerAnchorPoints.push({
	                        position: new THREE.Vector3(sample.x, sample.y, sample.z),
	                        bud: new THREE.Vector3(sample.budX, sample.budY, sample.budZ),
	                        center: new THREE.Vector3(sample.centerX, sample.centerY, sample.centerZ),
	                        color: sample.color.clone(),
	                        size: sample.size,
	                        reveal: sample.reveal,
	                        expansion: sample.expansion
	                    });
                } else if (r < 0.69) {
                    const def = chooseBloomDef();
                    sample = sampleBloom(def, true);
	                    if (i % 12 === 0) flowerAnchorPoints.push({
	                        position: new THREE.Vector3(sample.x, sample.y, sample.z),
	                        bud: new THREE.Vector3(sample.budX, sample.budY, sample.budZ),
	                        center: new THREE.Vector3(sample.centerX, sample.centerY, sample.centerZ),
	                        color: sample.color.clone(),
	                        size: sample.size,
	                        reveal: sample.reveal,
	                        expansion: sample.expansion
	                    });
                } else if (r < 0.78) {
	                    const def = bloomDefs[Math.floor(Math.random() * bloomDefs.length)];
	                    sample = samplePistil(def);
	                    sample.expansion = 0.24;
	                    if (i % 16 === 0) flowerAnchorPoints.push({
	                        position: new THREE.Vector3(sample.x, sample.y, sample.z),
	                        bud: new THREE.Vector3(sample.budX, sample.budY, sample.budZ),
	                        center: new THREE.Vector3(sample.centerX, sample.centerY, sample.centerZ),
	                        color: sample.color.clone(),
	                        size: sample.size,
	                        reveal: sample.reveal,
	                        expansion: sample.expansion
	                    });
	                } else if (r < 0.84) {
	                    const def = bloomDefs[Math.floor(Math.random() * bloomDefs.length)];
	                    sample = sampleCalyx(def);
	                    sample.expansion = 0.18;
                } else if (r < 0.90) {
                    sample = sampleStem(stemDefs[Math.floor(Math.random() * stemDefs.length)]);
                }
                else {
                    sample = sampleLeaf();
                }
            } else {
                // 【仅 4% 隐秘粒子】：绑定花瓣/花芯锚点，颜色和粒径完全复制花体粒子。
                const anchor = flowerAnchorPoints[Math.floor(Math.random() * flowerAnchorPoints.length)];
                const hiddenIndex = i - plantCount;
                const dust = new THREE.Vector3(
                    (Math.random() - 0.5) * 2.2,
                    (Math.random() - 0.5) * 1.7,
                    (Math.random() - 0.5) * 2.0
                );
                hiddenBasePositions[hiddenIndex * 3] = anchor.position.x;
                hiddenBasePositions[hiddenIndex * 3 + 1] = anchor.position.y;
                hiddenBasePositions[hiddenIndex * 3 + 2] = anchor.position.z;
                hiddenDustOffsets[hiddenIndex * 3] = dust.x;
                hiddenDustOffsets[hiddenIndex * 3 + 1] = dust.y;
                hiddenDustOffsets[hiddenIndex * 3 + 2] = dust.z;
                hiddenPhases[hiddenIndex] = Math.random() * Math.PI * 2;
                hiddenRadii[hiddenIndex] = 0.16 + Math.random() * 0.58;
                sample = {
                    x: anchor.position.x + dust.x,
                    y: anchor.position.y + dust.y,
                    z: anchor.position.z + dust.z,
	                    budX: anchor.bud.x + dust.x * 0.35,
	                    budY: anchor.bud.y + dust.y * 0.35,
	                    budZ: anchor.bud.z + dust.z * 0.35,
	                    centerX: anchor.center.x,
	                    centerY: anchor.center.y,
	                    centerZ: anchor.center.z,
	                    expansion: anchor.expansion * 0.72,
	                    color: anchor.color.clone(),
	                    size: anchor.size,
	                    reveal: anchor.reveal
                };
            }

            finalPositions[i * 3] = sample.x;
            finalPositions[i * 3 + 1] = sample.y;
            finalPositions[i * 3 + 2] = sample.z;
	            budPositions[i * 3] = sample.budX ?? sample.x;
	            budPositions[i * 3 + 1] = sample.budY ?? sample.y;
	            budPositions[i * 3 + 2] = sample.budZ ?? sample.z;
	            bloomCenters[i * 3] = sample.centerX ?? sample.x;
	            bloomCenters[i * 3 + 1] = sample.centerY ?? sample.y;
	            bloomCenters[i * 3 + 2] = sample.centerZ ?? sample.z;
	            bloomExpansionWeights[i] = sample.expansion ?? 0;
	            revealThresholds[i] = sample.reveal ?? 0;

            const initialBloom = revealThresholds[i] <= 0 ? 1 : 0;
            targetPositions[i * 3] = budPositions[i * 3] + (finalPositions[i * 3] - budPositions[i * 3]) * initialBloom;
            targetPositions[i * 3 + 1] = budPositions[i * 3 + 1] + (finalPositions[i * 3 + 1] - budPositions[i * 3 + 1]) * initialBloom;
            targetPositions[i * 3 + 2] = budPositions[i * 3 + 2] + (finalPositions[i * 3 + 2] - budPositions[i * 3 + 2]) * initialBloom;

            // 初始即显示实体花；音乐上传后再压缩回根部做绽放动画。
            positions[i * 3] = targetPositions[i * 3];
            positions[i * 3 + 1] = targetPositions[i * 3 + 1];
            positions[i * 3 + 2] = targetPositions[i * 3 + 2];

            colors[i * 3] = sample.color.r;
            colors[i * 3 + 1] = sample.color.g;
            colors[i * 3 + 2] = sample.color.b;
            sizes[i] = sample.size;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 1.35, 
            map: createDenseDustTexture(),
            vertexColors: true,
            blending: THREE.NormalBlending,
            transparent: true,
            opacity: 0.96,
            alphaTest: 0.28,
            depthTest: true,
            depthWrite: false
        });

        material.onBeforeCompile = (shader) => {
            shader.vertexShader = shader.vertexShader.replace('uniform float size;', 'attribute float size;');
        };

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- 右下角本地时间与共同聆听人数 ---
        const presenceTime = document.getElementById('presence-time');
        const presenceListeners = document.getElementById('presence-listeners');
        const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local';
        const locationName = userTimeZone.split('/').pop().replace(/_/g, ' ');

        function updatePresence() {
            const now = new Date();
            const timeText = new Intl.DateTimeFormat(undefined, {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            }).format(now);
            const count = 186 + Math.floor(Math.sin(now.getMinutes() * 0.37 + now.getSeconds() * 0.03) * 18 + Math.random() * 7);
            presenceTime.textContent = `${timeText} ${locationName}`;
            presenceListeners.textContent = `${count} listening with you`;
        }

        updatePresence();
        setInterval(updatePresence, 10000);

        // --- 全局变量与音频 ---
        let audioContext, analyser, frequencyData;
        let currentAudio = null;
        let growthFactor = 1.0;
        let currentShapeIndex = 0;
        let hiddenShapeMode = 'cloud';
        let hiddenMusicEnergy = 0;
        let bloomProgress = 0;
        let musicProgressClock = 0;

        function setupAudio(audioElement) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            const source = audioContext.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            frequencyData = new Uint8Array(analyser.frequencyBinCount);
        }

        // --- 隐蔽式局部几何变幻（只扰动花体内部粉尘，不生成独立数学物体） ---
        function updateHiddenMathShape(shapeType) {
            hiddenShapeMode = shapeType;
        }

        function smoothstep(edge0, edge1, x) {
            const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
            return t * t * (3 - 2 * t);
        }

        function revealAmountFor(index) {
            const threshold = revealThresholds[index];
            if (threshold <= 0) return 1;
            return smoothstep(threshold, threshold + 0.16, bloomProgress);
        }

        function expansionAmountFor(index) {
            const threshold = revealThresholds[index];
            const bloomSize = smoothstep(threshold + 0.08, threshold + 0.36, bloomProgress);
            return bloomSize * bloomExpansionWeights[index] * 0.22;
        }

        function updateProgressiveBloomTargets() {
            for (let i = 0; i < plantCount; i++) {
                const reveal = revealAmountFor(i);
                const idx = i * 3;
                const openX = budPositions[idx] + (finalPositions[idx] - budPositions[idx]) * reveal;
                const openY = budPositions[idx + 1] + (finalPositions[idx + 1] - budPositions[idx + 1]) * reveal;
                const openZ = budPositions[idx + 2] + (finalPositions[idx + 2] - budPositions[idx + 2]) * reveal;
                const expansion = expansionAmountFor(i);
                targetPositions[idx] = openX + (finalPositions[idx] - bloomCenters[idx]) * expansion;
                targetPositions[idx + 1] = openY + (finalPositions[idx + 1] - bloomCenters[idx + 1]) * expansion;
                targetPositions[idx + 2] = openZ + (finalPositions[idx + 2] - bloomCenters[idx + 2]) * expansion;
            }
        }

        function applyHiddenMicroDrift(elapsedTime, musicEnergy) {
            const amp = 0.28 + musicEnergy * 1.15;
            for (let h = 0; h < hiddenCount; h++) {
                const i = plantCount + h;
                const p = hiddenPhases[h] + elapsedTime * (0.45 + hiddenRadii[h] * 0.22);
                const baseIdx = h * 3;
                const idx = i * 3;
                const reveal = revealAmountFor(i);
                const expansion = expansionAmountFor(i);
                const baseX = hiddenBasePositions[baseIdx] + (hiddenBasePositions[baseIdx] - bloomCenters[idx]) * expansion;
                const baseY = hiddenBasePositions[baseIdx + 1] + (hiddenBasePositions[baseIdx + 1] - bloomCenters[idx + 1]) * expansion;
                const baseZ = hiddenBasePositions[baseIdx + 2] + (hiddenBasePositions[baseIdx + 2] - bloomCenters[idx + 2]) * expansion;
                const bx = budPositions[idx] + (baseX - budPositions[idx]) * reveal;
                const by = budPositions[idx + 1] + (baseY - budPositions[idx + 1]) * reveal;
                const bz = budPositions[idx + 2] + (baseZ - budPositions[idx + 2]) * reveal;
                const ox = hiddenDustOffsets[baseIdx];
                const oy = hiddenDustOffsets[baseIdx + 1];
                const oz = hiddenDustOffsets[baseIdx + 2];
                let dx = ox, dy = oy, dz = oz;

                if (hiddenShapeMode === 'lorenz') {
                    const lx = Math.sin(p * 1.7) * Math.cos(p * 0.73);
                    const ly = Math.sin(p * 1.13 + lx * 0.9);
                    const lz = Math.cos(p * 1.41) * Math.sin(p * 0.61);
                    dx += lx * hiddenRadii[h] * amp;
                    dy += ly * hiddenRadii[h] * amp * 0.72;
                    dz += lz * hiddenRadii[h] * amp;
                } else if (hiddenShapeMode === 'mobius') {
                    const u = p * 1.55;
                    const v = Math.sin(p * 0.9) * hiddenRadii[h] * 0.42;
                    dx += Math.cos(u) * (hiddenRadii[h] + v) * amp;
                    dy += Math.sin(u) * (hiddenRadii[h] + v) * amp * 0.55;
                    dz += Math.sin(u * 0.5) * v * amp;
                } else if (hiddenShapeMode === 'fractal') {
                    dx += Math.sin(p * 3.0) * Math.cos(p * 1.7) * hiddenRadii[h] * amp * 0.62;
                    dy += Math.sin(p * 2.0) * hiddenRadii[h] * amp * 0.42;
                    dz += Math.cos(p * 2.6) * Math.sin(p * 1.2) * hiddenRadii[h] * amp * 0.62;
                } else if (hiddenShapeMode === 'menger') {
                    const stepX = Math.sign(Math.sin(p * 2.1)) * 0.28;
                    const stepY = Math.sign(Math.cos(p * 1.7)) * 0.18;
                    const stepZ = Math.sign(Math.sin(p * 2.7)) * 0.28;
                    dx += stepX * hiddenRadii[h] * amp;
                    dy += stepY * hiddenRadii[h] * amp;
                    dz += stepZ * hiddenRadii[h] * amp;
                } else if (hiddenShapeMode === 'galaxy') {
                    const u = p * 1.25;
                    const spiral = hiddenRadii[h] * (0.5 + 0.5 * Math.sin(p * 0.37));
                    dx += Math.cos(u + spiral) * spiral * amp;
                    dy += Math.sin(p * 0.8) * hiddenRadii[h] * amp * 0.26;
                    dz += Math.sin(u + spiral) * spiral * amp;
                } else if (hiddenShapeMode === 'penrose') {
                    const corner = Math.floor((p % (Math.PI * 2)) / (Math.PI * 2 / 3));
                    const a = corner * Math.PI * 2 / 3 + p * 0.16;
                    dx += Math.cos(a) * hiddenRadii[h] * amp * 0.8;
                    dy += Math.sin(a + Math.PI * 0.33) * hiddenRadii[h] * amp * 0.34;
                    dz += Math.sin(a) * hiddenRadii[h] * amp * 0.8;
                } else if (hiddenShapeMode === 'heart') {
                    const u = p % (Math.PI * 2);
                    const hx = 0.055 * 16 * Math.pow(Math.sin(u), 3);
                    const hy = 0.055 * (13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u));
                    dx += hx * hiddenRadii[h] * amp;
                    dy += hy * hiddenRadii[h] * amp * 0.52;
                    dz += Math.sin(u * 0.5) * hiddenRadii[h] * amp * 0.22;
                } else {
                    dx += Math.sin(p) * hiddenRadii[h] * amp * 0.36;
                    dy += Math.cos(p * 1.23) * hiddenRadii[h] * amp * 0.24;
                    dz += Math.sin(p * 0.77) * hiddenRadii[h] * amp * 0.32;
                }

                targetPositions[idx] = bx + dx;
                targetPositions[idx + 1] = by + dy;
                targetPositions[idx + 2] = bz + dz;
            }
        }

        // --- 批量上传逻辑 ---
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.multiple = true; fileInput.accept = "audio/*";
        document.getElementById('upload-btn').addEventListener('click', () => fileInput.click());

        let playlist = [];
        fileInput.onchange = (e) => {
            playlist = Array.from(e.target.files);
            if (playlist.length > 0) {
                growthFactor = 0.0;
                bloomProgress = 0;
                musicProgressClock = 0;
                updateProgressiveBloomTargets();
                const posAttr = geometry.attributes.position;
                for (let i = 0; i < particleCount; i++) {
                    posAttr.array[i * 3] = targetPositions[i * 3] * 0.002;
                    posAttr.array[i * 3 + 1] = (targetPositions[i * 3 + 1] + 70) * 0.002 - 70;
                    posAttr.array[i * 3 + 2] = targetPositions[i * 3 + 2] * 0.002;
                }
                posAttr.needsUpdate = true;
                playSong(0);
            }
        };

        function playSong(index) {
            if (currentAudio) { currentAudio.pause(); currentAudio.remove(); }
            const file = playlist[index];
            updatePresence();
            
            currentAudio = new Audio(URL.createObjectURL(file));
            setupAudio(currentAudio);
            currentAudio.play();

            const shapes = ['cloud', 'lorenz', 'mobius', 'fractal', 'galaxy', 'heart', 'menger', 'penrose'];
            clearInterval(window.shapeTimer);
            window.shapeTimer = setInterval(() => {
                currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                updateHiddenMathShape(shapes[currentShapeIndex]);
            }, 8000);

            currentAudio.onended = () => {
                if (index + 1 < playlist.length) playSong(index + 1);
            };
        }

        // --- 物理主循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            const elapsedTime = clock.elapsedTime;
            const posAttr = geometry.attributes.position;

            // 1. 舒展生长动画
            if (currentAudio && !currentAudio.paused && growthFactor < 1.0) {
                growthFactor = Math.min(1, growthFactor + deltaTime * 0.72); 
            }
            if (currentAudio && !currentAudio.paused) {
                musicProgressClock += deltaTime;
                bloomProgress = Math.min(1, bloomProgress + deltaTime * (0.018 + hiddenMusicEnergy * 0.055));
                updateProgressiveBloomTargets();
                applyHiddenMicroDrift(elapsedTime, hiddenMusicEnergy);
            }

            // 2. 高阶平滑矩阵位移插值：全体粒子只在音乐绽放阶段更新，常态只更新隐藏数学粉尘。
            if (currentAudio && !currentAudio.paused && (growthFactor < 0.999 || bloomProgress < 0.999)) {
                for (let i = 0; i < particleCount * 3; i++) {
                    let actualTarget = targetPositions[i];
                    const grow = Math.min(1, growthFactor);
                    if (i % 3 === 1) actualTarget = (targetPositions[i] + 70) * grow - 70;
                    else actualTarget = targetPositions[i] * grow;
                    posAttr.array[i] += (actualTarget - posAttr.array[i]) * 0.055;
                }
                posAttr.needsUpdate = true;
            } else if (currentAudio && !currentAudio.paused) {
                for (let i = plantCount * 3; i < particleCount * 3; i++) {
                    posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.04;
                }
                posAttr.needsUpdate = true;
            }

            // 3. 优雅沉稳的自转速度
            particleSystem.rotation.y = elapsedTime * 0.02;

            // 4. 音频实时驱动
            if (analyser) {
                analyser.getByteFrequencyData(frequencyData);
                let bass = 0, treble = 0;
                for (let i = 0; i < 12; i++) bass += frequencyData[i];
                for (let i = 160; i < 220; i++) treble += frequencyData[i];
                bass /= 12; treble /= 50;
                hiddenMusicEnergy = Math.min(1, (bass / 255) * 0.72 + (treble / 255) * 0.28);

                // 强大的低音迫使巨型花冠随鼓点产生有呼吸感的有弹性舒张缩放
                const bScale = 1.0 + (bass / 255) * 0.12;
                particleSystem.scale.set(bScale, bScale, bScale);
                
                // 极小粒子随高音产生图2/3般微弱而细腻的波光闪烁
                material.size = 1.22 + (treble / 255) * 0.28;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
